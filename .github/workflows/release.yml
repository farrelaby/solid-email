name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish.
        required: true
        type: choice
        options:
          - "@solid-email/html-to-text"
          - "@solid-email/render"
          - "@akin01/solid-email"
      version:
        description: Package version to publish, for example 0.1.0.
        required: true
        type: string
permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package release
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/resolve-release-package.mjs --package "${{ inputs.package }}" --version "${{ inputs.version }}"
          else
            node scripts/resolve-release-package.mjs --tag "${{ github.event.release.tag_name }}"
          fi

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Run build
        run: pnpm build

      - name: Publish ${{ steps.package.outputs.name }} from ${{ steps.package.outputs.directory }}
        working-directory: ${{ steps.package.outputs.directory }}
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
