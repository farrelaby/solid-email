name: Create GitHub Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release. Defaults to each package version.
        required: false
        type: string
      prerelease:
        description: Mark releases as prereleases.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-releases:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create package releases
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          ARGS=()
          if [ -n "$INPUT_VERSION" ]; then
            ARGS+=(--version "$INPUT_VERSION")
          fi
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          node scripts/create-github-releases.mjs "${ARGS[@]}"
