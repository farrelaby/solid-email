name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release. Defaults to package.json version.
        required: false
        type: string
      prerelease:
        description: Mark the release as a prerelease.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve release metadata
        id: metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          TAG="v$VERSION"
          node - "$VERSION" <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          const version = process.argv[2];
          const changelog = readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split(/\r?\n/);
          const start = lines.findIndex((line) => line.startsWith(`## ${version}`));
          const end =
            start < 0
              ? -1
              : lines.findIndex((line, index) => index > start && line.startsWith('## '));
          const section = start < 0 ? [] : lines.slice(start + 1, end < 0 ? undefined : end);
          const body = section.join('\n').trim() || `Release ${version}`;

          writeFileSync('release-notes.md', `${body}\n`);
          NODE
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure release does not exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          ARGS=("$TAG" --title "$TAG" --notes-file release-notes.md --target "$GITHUB_SHA")
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"
